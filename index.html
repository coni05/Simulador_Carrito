<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador de Carrito de Compras</title>
    <link rel="stylesheet" href="css/app.css">
</head>
<body>

    <header class="header">
        <h1>Tienda Online</h1>
        <div class="cart-icon" id="cartIcon">
            <span class="cart-count" id="cartCount">0</span>
        </div>
    </header>

    <main class="container">
        <section class="products-section">
            <h2>Catálogo de Productos</h2>
            <div class="products-grid" id="productsGrid">
                <!-- Los productos se renderizarán aquí -->
            </div>
        </section>

        <aside class="cart-section" id="cartSection">
            <h2>Tu Carrito</h2>
            <div class="cart-items" id="cartItems">
                <!-- Los items del carrito se renderizarán aquí -->
            </div>
            <div class="cart-summary">
                <div class="subtotal">
                    <span>Subtotal:</span>
                    <span id="subtotal">$0.00</span>
                </div>
                <div class="tax">
                    <span>Impuestos (16%):</span>
                    <span id="tax">$0.00</span>
                </div>
                <div class="total">
                    <span>Total:</span>
                    <span id="total">$0.00</span>
                </div>
            </div>
            <div class="cart-actions">
                <button class="btn btn-secondary" id="clearCart">Vaciar Carrito</button>
            </div>
        </aside>
    </main>

    <div class="cart-overlay" id="cartOverlay"></div>

    <script src="js/app.js"></script>
</body>
</html>
